networks:
  traefik_proxy:
    external: true
    name: traefik_proxy

services:
  smokesolver:
    build:
      context: .
      dockerfile: Dockerfile
    image: smokesolver-serve:latest
    container_name: smokesolver
    command: ["serve", "--port", "8137", "--bind", "any", "--attrs", "Default,default,EntitySolid"]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - traefik_proxy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smokesolver.rule=Host(`smoke.${DOMAIN:-npc-server.top}`)"
      - "traefik.http.routers.smokesolver.entrypoints=websecure"
      - "traefik.http.routers.smokesolver.tls.certresolver=cloudflare"
      - "traefik.http.routers.smokesolver.middlewares=secureHeaders@file"
      - "traefik.http.services.smokesolver.loadbalancer.server.port=8137"
      - "traefik.docker.network=traefik_proxy"
      - "com.docker.compose.project=cs2-smoke-solver"

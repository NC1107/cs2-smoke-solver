networks:
  traefik_proxy:
    external: true
    name: traefik_proxy

services:
  smokesolver:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${SMOKESOLVER_IMAGE:-ghcr.io/nc1107/cs2-smoke-solver:latest}
    container_name: smokesolver
    command: ["serve", "--port", "8137", "--bind", "any", "--attrs", "Default,default,EntitySolid"]
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - traefik_proxy
    deploy:
      resources:
        limits:
          # A cache-miss solve is a CPU-bound Parallel.ForEach that scales
          # with whatever core count .NET sees (cgroup-aware, so it really is
          # bounded by this limit, not the host's full core count). 2 cores
          # measured at ~195% CPU during a real solve - contending 2+
          # concurrent solves against only 2 cores roughly doubles their
          # latency. Set high enough that a small handful of concurrent
          # solves don't starve each other; it's a ceiling, not a reservation,
          # so it costs nothing on hosts with fewer cores than this.
          cpus: '6.0'
          memory: 2G
        reservations:
          cpus: '0.1'
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smokesolver.rule=Host(`${SMOKESOLVER_DOMAIN:?set SMOKESOLVER_DOMAIN in .env}`)"
      - "traefik.http.routers.smokesolver.entrypoints=websecure"
      - "traefik.http.routers.smokesolver.tls.certresolver=cloudflare"
      - "traefik.http.routers.smokesolver.middlewares=secureHeaders@file"
      - "traefik.http.services.smokesolver.loadbalancer.server.port=8137"
      - "traefik.docker.network=traefik_proxy"
      - "com.docker.compose.project=cs2-smoke-solver"

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SmokeSolver.sln

      - name: Build
        run: dotnet build SmokeSolver.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/Sim.Tests/SmokeSolver.Sim.Tests.csproj -c Release --no-build

  publish-image:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nc1107/cs2-smoke-solver:latest
            ghcr.io/nc1107/cs2-smoke-solver:${{ github.sha }}

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SmokeSolver.sln

      - name: Build
        run: dotnet build SmokeSolver.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/Sim.Tests/SmokeSolver.Sim.Tests.csproj -c Release --no-build

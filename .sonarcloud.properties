# SonarQube Cloud Automatic Analysis configuration.
# (Automatic Analysis ignores sonar-project.properties and reads this file.)

# Exclude vendored third-party code we do not maintain: the bundled three.js
# GLTF/Draco loaders and any minified library drop. These are upstream sources,
# not ours to fix, and they accounted for the large majority of raw findings.
sonar.exclusions=viewer/lib/**,**/*.min.js
